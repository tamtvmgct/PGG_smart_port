<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GXT Hub — Remote Gate Registration</title>
    <style>
        :root {
            --primary: #0a192f;
            --accent: #64ffda;
            --bg-card: #112240;
            --text-main: #ccd6f6;
            --border: #233554;
        }
        body { background: var(--primary); color: var(--text-main); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .gxt-container { width: 450px; background: var(--bg-card); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(2,12,27,0.8); }
        .input-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 12px; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 12px; background: var(--primary); border: 1px solid var(--border); border-radius: 4px; color: white; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--accent); color: var(--primary); border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        
        /* Smart Search Styles */
        .search-container { position: relative; }
        .search-results {
            position: absolute; top: 100%; left: 0; width: 100%;
            background: var(--bg-card); border: 1px solid var(--accent);
            border-top: none; z-index: 100; max-height: 200px; overflow-y: auto;
            display: none;
        }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
        .search-item:hover { background: rgba(100, 255, 218, 0.1); }
    </style>
</head>
<body>
    <div class="gxt-container">
        <h2 style="text-align: center; color: var(--accent);">GXT — SMART GATE</h2>
        <div class="input-group">
            <label>Số Container (ISO 6346)</label>
            <input type="text" id="contId" placeholder="VD: MSKU1234567" maxlength="11">
        </div>
        <div class="input-group">
            <label>Biển số xe đầu kéo</label>
            <input type="text" id="plate" placeholder="VD: 51C-12345">
        </div>
        <div class="input-group">
            <label>Tên tàu vận chuyển (Smart Search)</label>
            <div class="search-container">
                <input type="text" id="vesselSearch" placeholder="Gõ để tìm tàu..." oninput="handleSearch(this.value)" onclick="handleSearch(this.value)">
                <div id="searchResults" class="search-results"></div>
            </div>
            <input type="hidden" id="vesselName">
        </div>
        <div class="input-group">
            <label>Loại lệnh</label>
            <select id="opType">
                <option value="EXPORT">HẠ BÃI (EXPORT)</option>
                <option value="IMPORT">LẤY NGUYÊN (IMPORT)</option>
            </select>
        </div>
        <button class="btn-submit" onclick="submitRegistration()">XÁC NHẬN ĐĂNG KÝ (V6.1)</button>
    </div>

    <script>
        const API_BASE = window.location.origin + "/api";
        const VESSEL_DATA = [
            { id: "V01", name: "MSC ALINA", flag: "Panama" },
            { id: "V02", name: "MAERSK HANOI", flag: "Denmark" },
            { id: "V03", name: "ONE EAGLE", flag: "Japan" },
            { id: "V04", name: "COSCO SHIPPING PRIDE", flag: "China" },
            { id: "V05", name: "EVER GIVEN", flag: "Taiwan" }
        ];

        function handleSearch(val) {
            const results = document.getElementById('searchResults');
            const filtered = VESSEL_DATA.filter(v => v.name.toLowerCase().includes(val.toLowerCase()));
            
            if (filtered.length > 0) {
                results.innerHTML = filtered.map(v => `
                    <div class="search-item" onclick="selectVessel('${v.name}')">${v.name} (${v.flag})</div>
                `).join('');
                results.style.display = 'block';
            } else {
                results.style.display = 'none';
            }
        }

        function selectVessel(name) {
            document.getElementById('vesselSearch').value = name;
            document.getElementById('vesselName').value = name;
            document.getElementById('searchResults').style.display = 'none';
        }

        async function submitRegistration() {
            const data = {
                containerId: document.getElementById('contId').value,
                truckPlate: document.getElementById('plate').value,
                vesselName: document.getElementById('vesselName').value || document.getElementById('vesselSearch').value,
                operationType: document.getElementById('opType').value
            };

            if(!data.containerId || !data.vesselName) return alert("Vui lòng nhập đầy đủ thông tin!");

            try {
                const res = await fetch(`${API_BASE}/containers`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if(result.ok) {
                    alert("Đăng ký thành công! Vui lòng vào vị trí chờ.");
                    window.location.reload();
                }
            } catch (err) { alert("Lỗi kết nối server!"); }
        }
    </script>
</body>
</html>
