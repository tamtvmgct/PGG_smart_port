<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIMS — Staff Portal Login</title>
    <style>
        :root {
            --primary: #0a192f;
            --accent: #64ffda;
            --bg-card: #112240;
            --text-main: #ccd6f6;
            --border: #233554;
        }
        body {
            background: var(--primary);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, rgba(100, 255, 218, 0.05) 0%, transparent 70%);
        }
        .login-card {
            width: 380px;
            background: var(--bg-card);
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(2, 12, 27, 0.8);
            text-align: center;
        }
        .logo {
            font-size: 28px;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 5px;
            letter-spacing: 2px;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 12px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: white;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: var(--accent);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(100, 255, 218, 0.3);
        }
        .error-msg {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 15px;
            display: none;
        }
        .footer {
            margin-top: 30px;
            font-size: 11px;
            color: #495670;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">PIMS PRO</div>
        <div class="subtitle">Internal Staff Portal — V6.1</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Tên đăng nhập (Username)</label>
                <input type="text" id="username" placeholder="Nhập tên đăng nhập..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu (Password)</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">ĐĂNG NHẬP HỆ THỐNG</button>
            <div id="errorMsg" class="error-msg">Sai tên đăng nhập hoặc mật khẩu!</div>
        </form>

        <div class="footer">
            Bản quyền thuộc về Port Integrated Management System.<br>
            Truy cập nội bộ được giám sát.
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + "/api";

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const error = document.getElementById('errorMsg');
            
            error.style.display = 'none';
            btn.innerText = 'ĐANG XÁC THỰC...';
            btn.disabled = true;

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                
                if (data.ok) {
                    // Save session
                    localStorage.setItem('pims_session', JSON.stringify(data.session));
                    localStorage.setItem('pims_token', data.token);
                    
                    // Redirect based on role
                    if (data.session.role === 'ADMIN') window.location.href = 'index.html';
                    else if (data.session.role === 'GNT') window.location.href = 'gnt.html';
                    else window.location.href = 'gxt.html';
                } else {
                    error.style.display = 'block';
                    btn.innerText = 'ĐĂNG NHẬP HỆ THỐNG';
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Lỗi kết nối server!");
                btn.innerText = 'ĐĂNG NHẬP HỆ THỐNG';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
